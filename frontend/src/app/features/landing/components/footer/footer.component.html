<footer class="footer">
  <div class="container">
    <div class="footer__grid">
      <div class="footer__brand">
        <div class="footer__logo-row">
          <img src="assets/brand/pedialink-logo.png" alt="PediaLink" class="footer__logo" />
        </div>
        <p class="footer__tagline">
          Connecting parents and pediatricians for better child health outcomes.
        </p>
        <div class="footer__social">
          <a href="#" aria-label="Twitter"><lucide-icon name="twitter" [size]="16"></lucide-icon></a>
          <a href="#" aria-label="LinkedIn"><lucide-icon name="linkedin" [size]="16"></lucide-icon></a>
          <a href="#" aria-label="Facebook"><lucide-icon name="facebook" [size]="16"></lucide-icon></a>
          <a href="#" aria-label="Instagram"><lucide-icon name="instagram" [size]="16"></lucide-icon></a>
        </div>
      </div>
      <div class="footer__col">
        <h4 class="footer__heading">Product</h4>
        <a href="#features">Features</a>
        <a href="#pricing">Pricing</a>
        <a href="#faq">FAQ</a>
        <a href="#">Changelog</a>
      </div>
      <div class="footer__col">
        <h4 class="footer__heading">Company</h4>
        <a href="#">About</a>
        <a href="#">Blog</a>
        <a href="#">Careers</a>
        <a href="#">Contact</a>
      </div>
      <div class="footer__col">
        <h4 class="footer__heading">Legal</h4>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Cookie Policy</a>
      </div>
    </div>
    <div class="footer__bottom">
      <p>&copy; {{ year }} PediaLink. All rights reserved.</p>
    </div>
  </div>
</footer>
