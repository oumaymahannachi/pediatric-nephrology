<section class="hero">
  <div class="hero__bg-shapes">
    <div class="hero__shape hero__shape--1"></div>
    <div class="hero__shape hero__shape--2"></div>
    <div class="hero__shape hero__shape--3"></div>
  </div>
  <div class="container hero__content animate-fade-in-up">
    <span class="section-badge"><lucide-icon name="stethoscope" [size]="14"></lucide-icon> Trusted by 500+ Pediatricians</span>
    <h1 class="hero__title">
      Your Child's Health,<br />
      <span class="hero__highlight">Beautifully Tracked</span>
    </h1>
    <p class="hero__subtitle">
      PediaLink connects parents and pediatricians on one secure platform.
      Track growth, manage appointments, and stay on top of your child's health milestones.
    </p>
    <div class="hero__actions">
      <a routerLink="/auth/signup" class="btn-primary btn-lg">Get Started Free</a>
      <a routerLink="/auth/signup" class="btn-secondary btn-lg">For Doctors</a>
    </div>
    <div class="hero__stats">
      <div class="hero__stat">
        <strong>10K+</strong>
        <span>Families</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <strong>500+</strong>
        <span>Doctors</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <strong>99.9%</strong>
        <span>Uptime</span>
      </div>
    </div>
  </div>
</section>
