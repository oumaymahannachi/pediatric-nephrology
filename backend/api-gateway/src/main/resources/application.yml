server:
  port: 8090

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: auth-service-admin
          uri: lb://auth-service
          predicates:
            - Path=/api/admin/**
        - id: auth-service-users
          uri: lb://auth-service
          predicates:
            - Path=/api/users/**
        - id: treatment-parent
          uri: lb://treatment-monitoring-service
          predicates:
            - Path=/api/parent/**
        - id: treatment-doctor
          uri: lb://treatment-monitoring-service
          predicates:
            - Path=/api/doctor/**
        - id: treatment-admin
          uri: lb://treatment-monitoring-service
          predicates:
            - Path=/api/treatment-admin/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            exposedHeaders:
              - "Authorization"
              - "Content-Type"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
