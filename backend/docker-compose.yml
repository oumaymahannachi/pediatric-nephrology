services:

  eureka-server:
    build: ./eureka-server
    container_name: pedialink-eureka
    ports:
      - "8761:8761"
    networks:
      - pedialink-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  config-server:
    build: ./config-server
    container_name: pedialink-config
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - pedialink-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./api-gateway
    container_name: pedialink-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    networks:
      - pedialink-net

  auth-service:
    build: ./auth-service
    container_name: pedialink-auth
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_DATA_MONGODB_URI=mongodb+srv://PediaLink:PediaLink@pedialink.0d8a5qd.mongodb.net/pedialink?retryWrites=true&w=majority
      - MONGODB_NOTIFICATIONS_URI=mongodb+srv://PediaLink:PediaLink@pedialink.0d8a5qd.mongodb.net/pedialink_notifications?retryWrites=true&w=majority
    networks:
      - pedialink-net

  prescription-service:
    build: ./prescription-service
    container_name: pedialink-prescription
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_DATA_MONGODB_URI=mongodb+srv://PediaLink:PediaLink@pedialink.0d8a5qd.mongodb.net/pedialink_prescriptions?retryWrites=true&w=majority
      - SERVER_PORT=8082
      - JWT_SECRET=votre-cle-secrete-tres-longue-pour-jwt-signing-min-256-bits
    networks:
      - pedialink-net

  dossiermedical-service:
    build: ./dossiermedical-service
    container_name: pedialink-dossiermedical
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_DATA_MONGODB_URI=mongodb+srv://PediaLink:PediaLink@pedialink.0d8a5qd.mongodb.net/pedialink_dossiers?retryWrites=true&w=majority
      - SERVER_PORT=8084
      - JWT_SECRET=votre-cle-secrete-tres-longue-pour-jwt-signing-min-256-bits
    networks:
      - pedialink-net

  treatment-monitoring-service:
    build: ./treatment-monitoring-service
    container_name: pedialink-treatment
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_DATA_MONGODB_URI=mongodb+srv://PediaLink:PediaLink@pedialink.0d8a5qd.mongodb.net/pedialink_treatment?retryWrites=true&w=majority
      - SERVER_PORT=8085
      - JWT_SECRET=PediaLinkSuperSecretKeyForJwtToken2024MustBeAtLeast256BitsLong!!
    networks:
      - pedialink-net

networks:
  pedialink-net:
    driver: bridge
